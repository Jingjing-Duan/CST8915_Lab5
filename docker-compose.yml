version: '3'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=myuser
      - RABBITMQ_DEFAULT_PASS=mypassword

  order-service:
    build: ./order-service-L4
    ports:
      - "3001:3000"
    environment:
      - RABBITMQ_CONNECTION_STRING=amqp://myuser:mypassword@rabbitmq:5672/
      - PORT=3000
    depends_on:
      - rabbitmq

  product-service:
    build: ./product-service-python-L4
    ports:
      - "3031:3030"
    environment:
      - PORT=3030

  store-front:
    build: ./store-front-L4
    ports:
      - "8080:80"
    depends_on:
      - product-service
      - order-service